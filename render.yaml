services:
  # Backend API Service
  - type: web
    name: voice-karar-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://voice-karar-frontend.onrender.com
      - key: APP_BASE_URL
        value: https://voice-karar-frontend.onrender.com
      - key: AI_AGENT_URL
        value: https://voice-karar-ai-agent.onrender.com

  # AI Agent Service
  - type: web
    name: voice-karar-ai-agent
    env: node
    plan: free
    rootDir: ai-agent
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash

  # Frontend Static Site
  - type: web
    name: voice-karar-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://voice-karar-backend.onrender.com/api/v1
